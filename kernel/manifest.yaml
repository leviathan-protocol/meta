  - id: OUTLINE
    file: kernel/OUTLINE.md
    version: "0.1.0"
    tier: meta
    role: "Drafting outline; locked terminology; open questions."
    asserts: []
    depends_on: []

# ---------------------------------------------------------------------------
# specs: implementation specifications. Sibling to kernel/, not subordinate.
# Specs implement what kernel asserts. See specs/README.md.
# ---------------------------------------------------------------------------
specs:
  - id: NODE_SPEC
    file: specs/NODE_SPEC.md
    version: "1.0.0"
    role: "Validator-node implementation: Magistrate panel internals, slashing schedule, panel-size rules."
    implements: [I-1, I-2, I-3]
    snapshot_origin: pre-kernel  # imported, see specs/README.md §Pre-Kernel Status

  - id: ARCHITECTURE
    file: specs/ARCHITECTURE.md
    role: "System architecture spec — predates kernel."
    snapshot_origin: pre-kernel

  - id: CONTRACT_SPEC
    file: specs/CONTRACT_SPEC.md
    version: "2.0"
    role: "Smart contracts spec — predates kernel."
    snapshot_origin: pre-kernel

  - id: LLM_PANEL_PROTOCOL
    file: specs/LLM_PANEL_PROTOCOL.md
    version: "0.1.0"
    role: "Build-phase operationalization of Magistrate Pattern via LLM CLIs (Claude + Codex + ...). Tier-sized panels, blind evaluation."
    implements: [I-1, I-2, I-3]
    depends_on_kernel: [02-anatomy, 04-living, 06-mind]
    notes: "Satisfies I-2 for build phase. Does NOT satisfy Decentralization Path criterion 2 (governance-stake separation). Per panels/0001-build-skeleton/merge.md, this 'satisfies I-2' framing is flagged for v0.2.0 amendment as build-phase carve-out, not satisfaction."

  - id: FORK_PROTOCOL
    file: specs/FORK_PROTOCOL.md
    version: "0.1.0"
    role: "Vendored fork specification: file boundary categories (kernel-owned/instance-owned/hybrid), fork-manifest schema, init/pull/conformance procedures. Operationalizes 03-constellation.md §6."
    implements: [I-1, I-4, I-7]
    depends_on_kernel: [00-meta, 03-constellation, 04-living]
    notes: "Build-phase carve-out: founder-only authorship for v0.1.0. v0.2.0 promotion gated on three test forks (FORK_PROTOCOL §9) plus panel review."

  - id: README
    file: specs/README.md
    role: "Specs orientation: pre-kernel status, build-phase vs steady-state cadence, conformance check command."

# ---------------------------------------------------------------------------
# tools: enforcement code. The kernel becomes testable through these.
# ---------------------------------------------------------------------------
tools:
  - id: conformance
    file: tools/conformance.py
    version: "0.3.0"
    role: "Regex evidence/violation check for the 7 invariants, plus manifest drift, plus fork conformance (--fork mode), plus CLARIFY debt scan (--clarify-debt). Tier-aware: kernel must affirm AND not violate; specs must not violate, must affirm I-1/I-2/I-3."
    enforces: [I-1, I-2, I-3, I-4, I-5, I-6, I-7]

  - id: pre-commit
    file: tools/pre-commit.sh
    role: "Per-commit hook. Runs conformance.py --all when kernel/ or specs/ files staged. Build-phase cadence enforcement."

  - id: fork-init
    file: tools/fork-init.sh
    version: "0.1.0"
    role: "Initialize a vendored fork from this kernel. Copies kernel-owned, creates instance-owned skeleton, generates .fork-manifest.yaml. FORK_PROTOCOL §6."
    enforces_via: [FORK_PROTOCOL]

  - id: fork-pull
    file: tools/fork-pull.sh
    version: "0.1.0"
    role: "Pull upstream kernel changes into a vendored fork. Hash check, 3-way merge for hybrid files, manifest update. FORK_PROTOCOL §7."
    enforces_via: [FORK_PROTOCOL]
    enforces_via: [conformance]

# ---------------------------------------------------------------------------
# templates: scaffolds that any kernel-touching amendment or instance lesson
# must use. Kernel-owned (forks inherit). Listed here so manifest drift is
# observable when a template is touched. See specs/research/spec-kit-inspiration.md
# §5.1 for the borrowed-pattern rationale.
# ---------------------------------------------------------------------------
templates:
  - id: amendment-plan
    file: templates/amendment-plan-template.md
    version: "0.1.0"
    tier: protected
    role: "Structural scaffold for any amendment that touches kernel-owned files. Mandatory ## §3 Invariant Impact Check enumerates I-1..I-7 with unchanged|strengthened|weakened annotation; weakening any invariant is a divergent-fork act per 00-meta.md §4.5."
    depends_on_kernel: [00-meta, 04-living, glossary]
    referenced_by: [LLM_PANEL_PROTOCOL]

  - id: lesson
    file: templates/lesson-template.md
    version: "0.1.0"
    tier: protected
    role: "Structural scaffold for an instance to record a kernel-relevant pattern observed in operation. Upstream artifact of the lesson → propagate workflow chain. ## §5 Kernel-relevance check determines whether the lesson promotes to an amendment plan."
    depends_on_kernel: [04-living, glossary]
    referenced_by: [amendment-plan]

# ---------------------------------------------------------------------------
# invariants: the 7 immutable constants. Where asserted, where enforced.
# ---------------------------------------------------------------------------
invariants:
  I-1:
    name: "Reasoning trail required"
    introduced: "0.1.0"
    asserted_in: [00-meta §7, 02-anatomy §6, 06-mind §3, 10-tasks §6]
    enforced_by: [conformance, NODE_SPEC, LLM_PANEL_PROTOCOL]

  I-2:
    name: "Heterogeneous evaluation"
    introduced: "0.1.0"
    asserted_in: [00-meta §4.3, 00-meta §7, 02-anatomy §6.2, 06-mind §4.4]
    enforced_by: [conformance, NODE_SPEC §6, LLM_PANEL_PROTOCOL §2]
    notes: "Build phase: LLM_PANEL_PROTOCOL provides heterogeneity via distinct CLIs. Does NOT satisfy Sybil-resistance (separate concern)."

  I-3:
    name: "Dissent is protected"
    introduced: "0.1.0"
    asserted_in: [00-meta §7, 02-anatomy §6.2, 07-economy §3]
    enforced_by: [conformance, NODE_SPEC §10, LLM_PANEL_PROTOCOL §3]

  I-4:
    name: "Fork freedom"
    introduced: "0.1.0"
    asserted_in: [00-meta §4.5, 00-meta §7, 03-constellation §6, 09-engage]
    enforced_by: [conformance]
    notes: "MIT-licensed; cannot be tightened retroactively."

  I-5:
    name: "Founder removability"
    introduced: "0.1.0"
    asserted_in: [00-meta §7, 01-why §4, 03-constellation §5]
    enforced_by: [conformance]
    success_test: "Founder Independence Criterion (01-why §4) — currently 0/4 met."

  I-6:
    name: "Instance data sovereignty"
    introduced: "0.1.0"
    asserted_in: [00-meta §7, 03-constellation §3, 07-economy §2.2]
    enforced_by: [conformance]

  I-7:
    name: "No retroactive amendment"
    introduced: "0.1.0"
    asserted_in: [00-meta §7, 04-living §5, 10-tasks §3, CHANGELOG]
    enforced_by: [conformance, pre-commit, CHANGELOG (append-only)]

