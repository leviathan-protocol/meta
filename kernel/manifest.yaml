    depends_on: [00-meta, 02-anatomy, 04-living, 08-shadow]

  - id: glossary
    file: kernel/glossary.md
    version: "0.6.0"
    tier: protected
    role: "Terms layer of the kernel itself."
    asserts: []
    depends_on: []

  - id: CHANGELOG
    file: kernel/CHANGELOG.md
    version: "0.1.0"
    tier: protected
    role: "Append-only modification log; meta-rules in action; defended by I-7."
    asserts: [I-7]
    depends_on: [00-meta, 04-living]

  - id: README
    file: kernel/README.md
    version: "0.1.0"
    tier: protected
    role: "1-page navigable index; honest pre-success header."
