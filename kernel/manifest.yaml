# manifest.yaml — Kernel Structural Manifest
#
# Machine-readable graph of the kernel: parts, specs, tools, invariants, and
# the structurally load-bearing terms with their cross-references.
#
# What this is: the part-list, the invariant assertion/enforcement map, the
# term dependency graph. Used by tools/conformance.py for graph-level checks
# beyond the regex-only invariant check, and by future maintainers to ask
# questions like "which parts cite I-2?" or "what depends on the Magistrate
# term?".
#
# What this is NOT: a duplicate of glossary.md. Term DEFINITIONS live in
# glossary.md only. This manifest stores ONLY the graph (depends_on,
# appears_in, asserted_in). One source of truth per fact.
#
# What this is NOT: an evolution log. Per-element history lives in
# CHANGELOG.md. This manifest stores only the CURRENT version snapshot.
#
# Update rule: every CHANGELOG.md entry that bumps a part version must update
# the corresponding `version:` field here in the same patch. Conformance
# checks for drift between these and the headers of the part files.
#
# Document version: 0.1.0
# Tier: protected
# Last touched: 2026-05-04

manifest_version: "0.2.0"
last_touched: "2026-05-04"
phase: build  # build | steady-state — see kernel/04-living.md §6

# ---------------------------------------------------------------------------
# parts: the kernel's first-class documents.
# Tier values: meta | protected. (No mutable kernel parts in v0.1.0.)
# ---------------------------------------------------------------------------
parts:
