    depends_on: [02-anatomy, 03-constellation]

  - id: 08-shadow
    file: kernel/08-shadow.md
    version: "0.1.0"
    tier: protected
    role: "Named failure modes (7); watch signals; counter-provisions."
    asserts: []   # observes risks, asserts no new invariants
    depends_on: [00-meta, 03-constellation, 05-evidence]

  - id: 09-engage
    file: kernel/09-engage.md
    version: "0.1.0"
    tier: protected
    role: "Audience reading paths (operators, users, researchers, critics); fork-divergence as honest critique."
    asserts: []
    depends_on: [00-meta, 03-constellation]

  - id: 10-tasks
    file: kernel/10-tasks.md
    version: "0.1.0"
    tier: protected
    role: "Task layer: structural identity between transient task units and persistent constitutional content. Universal schema, lifecycle, capability class taxonomy, outcome → lesson loop, evidence requirement."
