    depends_on: [00-meta]

  - id: 02-anatomy
    file: kernel/02-anatomy.md
    version: "0.1.0"
    tier: protected
    role: "Four-layer constitutional substrate; Trinity (Sidecar/Magistrate/Sovereign); Sub-Constitution Superset Rule."
    asserts: [I-1, I-2]
    depends_on: [00-meta, glossary]

  - id: 03-constellation
    file: kernel/03-constellation.md
    version: "0.2.0"
