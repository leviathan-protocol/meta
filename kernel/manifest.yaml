# ---------------------------------------------------------------------------
# Closing notes
# ---------------------------------------------------------------------------
# This manifest is read-able by tools/conformance.py for future drift checks
# (e.g., a part header lists v0.2.0 but manifest says v0.1.0 — drift). That
# integration is not yet wired in v0.1.0 of conformance.py; it is the next
# small-scoped extension.
#
# Adding a new part: append to `parts:`. Adding a new spec: append to
# `specs:`. Adding a new term used in ≥2 parts: append to `terms:` AND
# update glossary.md. Adding an invariant: requires panel review per
# 00-meta §7.
#
# Removing a term from `terms:` requires verifying it is referenced in <2
# parts. Removing a part requires CHANGELOG entry and amendment procedure.
#
# This file is the kernel's structural skeleton. If it disagrees with the
# part files themselves, the part files are authoritative; this manifest is
# revised. The asymmetry is intentional: prose carries the meaning, this
# carries the structure.
