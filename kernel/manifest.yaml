    depends_on: [00-meta, 02-anatomy]

  - id: 05-evidence
    file: kernel/05-evidence.md
    version: "0.1.0"
    tier: protected
    role: "Per-instance evidence; cross-instance patterns; limitations; falsification thresholds."
